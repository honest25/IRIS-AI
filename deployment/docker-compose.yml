version: "3.9"

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────────
  iris-postgres:
    image: postgres:16-alpine
    container_name: iris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iris_pass}
      POSTGRES_DB: ${POSTGRES_DB:-iris_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iris"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ──────────────────────────────────────────────────────────────
  iris-redis:
    image: redis:7-alpine
    container_name: iris-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── IRIS Backend (FastAPI) ───────────────────────────────────────────────────
  iris-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: iris-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      POSTGRES_SERVER: iris-postgres
      REDIS_URL: redis://iris-redis:6379/0
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    volumes:
      - memory_data:/app/memory_data
    depends_on:
      iris-postgres:
        condition: service_healthy
      iris-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── IRIS Web Dashboard (Next.js) ─────────────────────────────────────────────
  iris-web:
    build:
      context: ../clients/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://iris-backend:8000/api/v1
        NEXT_PUBLIC_WS_URL: ws://iris-backend:8000/api/v1
    container_name: iris-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - iris-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  memory_data:
    driver: local

networks:
  default:
    name: iris-network
