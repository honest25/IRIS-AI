services:
  - type: web
    name: iris-ai-api
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: POSTGRES_SERVER
        sync: false
      - key: POSTGRES_PORT
        value: 5432
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: REDIS_URL
        # We leave this blank so user can add an external Redis like Upstash if they want, 
        # or we rely on default localhost if they add a Redis instance
        value: redis://localhost:6379/0
